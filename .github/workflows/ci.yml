name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --workspace

  build-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install
        working-directory: ./sdk
        run: npm install
      - name: typecheck
        working-directory: ./sdk
        run: npx tsc --noEmit
      - name: build
        working-directory: ./sdk
        run: npm run build

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: check
        working-directory: ./client
        run: cargo check

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace -- -W warnings
        continue-on-error: true

  devnet-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build-program, build-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install
        working-directory: ./sdk
        run: npm install
      - name: run devnet suite
        working-directory: ./sdk
        run: npx tsx test/suite.ts
        env:
          X402_RPC: https://api.devnet.solana.com
          DEVNET_KEYPAIR: ${{ secrets.DEVNET_KEYPAIR }}
        continue-on-error: true
